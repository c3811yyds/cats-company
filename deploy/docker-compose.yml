services:
  mysql:
    image: mysql:8.0
    container_name: catscompany-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: openchat
      MYSQL_USER: ${MYSQL_USER:-openchat}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
      args:
        GOPROXY: "${GOPROXY:-https://proxy.golang.org,direct}"
    container_name: catscompany-server
    restart: unless-stopped
    ports:
      - "6061:6061"
      - "6062:6062"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      OC_DB_DSN: "${MYSQL_USER:-openchat}:${MYSQL_PASSWORD:-changeme}@tcp(mysql:3306)/openchat?parseTime=true&charset=utf8mb4"
      DEPLOY_API_URL: "${DEPLOY_API_URL:-}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6061/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  webapp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.webapp
    container_name: catscompany-webapp
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      REACT_APP_API_BASE: ""

  assistant:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.assistant
    container_name: catscompany-assistant
    restart: unless-stopped
    depends_on:
      - server
    environment:
      OPENCHAT_GRPC_ADDR: "server:6062"
      BOT_USERNAME: "ai_assistant"
      BOT_PASSWORD: "${BOT_ASSISTANT_PASSWORD:-changeme}"
      LLM_API_BASE: "${LLM_API_BASE:-https://api.openai.com/v1}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-gpt-3.5-turbo}"

  xiaoba-ts:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.xiaoba-ts
    container_name: catscompany-xiaoba-ts
    restart: unless-stopped
    depends_on:
      - server
    environment:
      BOT_API_KEY: "${XIAOBA_BOT_API_KEY:-}"
      BOT_WS_URL: "ws://server:6061/v0/channels"
      LLM_API_BASE: "${LLM_API_BASE:-https://api.openai.com/v1}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-gpt-3.5-turbo}"
      MAX_HISTORY: "20"

  nginx:
    image: nginx:alpine
    container_name: catscompany-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - server
      - webapp
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mysql_data:
  uploads_data:
