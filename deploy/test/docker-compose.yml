services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: openchat
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      BOT_ASSISTANT_PASSWORD: ${BOT_ASSISTANT_PASSWORD}
      TZ: Asia/Shanghai
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    ports:
      - "${TEST_MYSQL_HOST_PORT:-13306}:3306"
    volumes:
      - "${TEST_STACK_ROOT}/data/mysql:/var/lib/mysql"
      - "${TEST_STACK_ROOT}/compose/init-db.sh:/docker-entrypoint-initdb.d/01-init.sh:ro"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - textnet

  server:
    image: "${GHCR_REGISTRY:-ghcr.io}/${GHCR_OWNER}/cats-company-server:${IMAGE_TAG}"
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      OC_DB_DSN: "${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(mysql:3306)/openchat?parseTime=true&charset=utf8mb4"
      OC_JWT_SECRET: "${OC_JWT_SECRET}"
      APP_ENV: test
      TZ: Asia/Shanghai
    ports:
      - "${TEST_API_HOST_PORT:-16061}:6061"
      - "${TEST_GRPC_HOST_PORT:-16062}:6062"
    volumes:
      - "${TEST_STACK_ROOT}/data/uploads:/app/uploads"
      - "${TEST_STACK_ROOT}/compose/tinode.test.conf:/app/tinode.conf:ro"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6061/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - textnet

  web:
    image: "${GHCR_REGISTRY:-ghcr.io}/${GHCR_OWNER}/cats-company-web:${IMAGE_TAG}"
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${TEST_WEB_HOST_PORT:-18080}:80"
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && test -s /usr/share/nginx/html/index.html"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - textnet

networks:
  textnet:
    name: catscompany_test_net
